<body class="contact-page">

<header class="header">
  <section class="flex">

    <a href="home.html" class="logo">
      <i class="fas fa-briefcase"></i> JobHunt
    </a>

    <nav class="navbar">
      <a href="home.html">Home</a>
      <a href="about.html">About</a>
      <a href="jobs.html">Jobs</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Account</a>
    </nav>

    <a href="#" class="btn">Post Job</a>

  </section>

<div class="section-title">Contact Us</div>

<section class="contact">

<div class="box-container">

<div class="box">
<i class="fas fa-phone"></i>
<a href="tel:1234567890">123-456-7890</a>
<a href="tel:1112223333">111-222-3333</a>
</div>

<div class="box">
<i class="fas fa-map-marker-alt"></i>
<p>Flat no.1, A-1 building, Jogeshwari, Mumbai, India</p>
</div>

<div class="box">
<i class="fas fa-envelope"></i>
<a href="mailto:nidhisharma@gmail.com">nidhisharma@gmail.com</a>
<a href="mailto:aasthagautam@gmail.com">aasthagautam@gmail.com</a>
</div>

</div>

<form action="" method="post">
<h3>Drop your message</h3>

<input type="text" name="name" placeholder="Enter your name" required class="input">
<input type="email" name="email" placeholder="Enter your email" required class="input">
<input type="number" name="number" placeholder="Enter your number" required class="input">

<select name="role" required class="input">
<option value="">Select role</option>
<option value="seeker">Job Seeker</option>
<option value="provider">Job Provider</option>
</select>

<textarea name="message" placeholder="Enter your message" required class="input"></textarea>

<input type="submit" value="Send Message" class="btn">

</form>

</section>

</body>
</html>
