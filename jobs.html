<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Jobs - JobHunt</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:#111;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#fff;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
}

.navbar a{
    color:#fff;
    margin:0 10px;
    text-decoration:none;
}

.btn{
    background:#ff4b2b;
    color:#fff;
    padding:8px 15px;
    border-radius:5px;
    text-decoration:none;
}

/* FILTER */
.job-filter{
    padding:20px;
    background:grey;
}

.heading{
    text-align:center;
    margin-bottom:20px;
}

.flex{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.box input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* JOBS */
.jobs-container{
    padding:20px;
}

.box-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.job-box{
    background:slategrey;
    padding:15px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.job-title{
    background-color:teal;
    font-size:18px;
    margin:10px 0;
}

.tags p{
    margin:5px 0;
}

/* BUTTON */
.flex-btn{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.heart{
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
    color:red;
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <a href="home.html" class="logo"><i class="fas fa-briefcase"></i> JobHunt</a>

    <nav class="navbar">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <a href="jobs.html">Jobs</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Account</a>
    </nav>

    <a href="#" class="btn">Post Job</a>
</header>

<!-- FILTER -->
<section class="job-filter">
    <h1 class="heading">Filter Jobs</h1>

    <div class="flex">

        <div class="box">
            <input type="text" placeholder="Job Title">
        </div>

        <div class="box">
            <input type="text" placeholder="Location">
        </div>

        <div class="box">
            <input type="text" placeholder="Salary Range">
        </div>

        <div class="box">
            <input type="text" placeholder="Job Type (Full Time / Part Time)">
        </div>

    </div>
</section>

<!-- JOB LIST -->
<section class="jobs-container">
    <h1 class="heading">Latest Jobs</h1>

    <div class="box-container">

        <!-- JOB 1 -->
        <div class="job-box">
            <h3>IT Infosys Co.</h3>
            <p class="job-title">Senior Web Developer</p>

            <div class="tags">
                <p><i class="fas fa-map-marker-alt"></i> Mumbai, India</p>
                <p><i class="fas fa-indian-rupee-sign"></i> 10k - 25k</p>
                <p><i class="fas fa-briefcase"></i> Part Time</p>
                <p><i class="fas fa-clock"></i> Day Shift</p>
            </div>

            <div class="flex-btn">
                <a href="view-job.html" class="btn">View Details</a>
                <button class="heart"><i class="far fa-heart"></i></button>
            </div>
        </div>

        <!-- JOB 2 -->
        <div class="job-box">
            <h3>Mass Idea</h3>
            <p class="job-title">PHP Developer</p>

            <div class="tags">
                <p><i class="fas fa-map-marker-alt"></i> Mumbai, India</p>
                <p><i class="fas fa-indian-rupee-sign"></i> 30k - 1 Lakh</p>
                <p><i class="fas fa-briefcase"></i> Fresher</p>
                <p><i class="fas fa-clock"></i> Fixed Shift</p>
            </div>

            <div class="flex-btn">
                <a href="view-job.html" class="btn">View Details</a>
                <button class="heart"><i class="far fa-heart"></i></button>
            </div>
        </div>

    </div>
</section>

</body>
</html>
